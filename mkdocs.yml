site_name: Co-op Translator
site_description: API and CLI documentation for Co-op Translator.
site_url: https://azure.github.io/co-op-translator/
repo_url: https://github.com/Azure/co-op-translator
repo_name: Azure/co-op-translator

docs_dir: docs
site_dir: site
not_in_nav: |
  i18n/**

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/tailwind-config.js
  - javascripts/i18n-navigation.js
  - https://cdn.tailwindcss.com

